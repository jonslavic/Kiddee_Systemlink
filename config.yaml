# Column mapping — matches the 'testdata' sheet exactly.
# These names must match the Excel column headers character-for-character.
column_mapping:
  model:            "Model"            # Part/model number  → programName + partNumber
  serial_number:    "SerialNumber"     # DUT serial number  → serialNumber
  status:           "TestResult"       # Pass / Fail        → result status
  started_at:       "DateTime"         # Test timestamp     → startedAt

  # Failure step detail (only populated on Fail rows)
  step_name:        "TestStepFailed"   # Name of the step that failed
  step_value:       "MeasuredValue"    # Actual measured value
  step_type:        "MeasurementType"  # e.g. BoundaryScan
  step_low_limit:   "LowerLimit"       # Expected low / exact limit
  step_high_limit:  "UpperLimit"       # Expected high limit (NaN if not applicable)
